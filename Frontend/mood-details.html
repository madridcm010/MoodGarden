<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mood Input</title>
  <link rel="stylesheet" href="mood-details.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="mood-container">

    <div class="mood-card">

      <button id="angryMoodBtn" class="mood-button">
        <span id="moodEmoji" class="emoji">😐</span>
        <span id="moodLabel" class="label">Mood</span>
      </button>

      <div class="slider-section">
        <label for="intensitySlider">Intensity</label>
        <input 
          type="range" 
          id="intensitySlider" 
          min="1" 
          max="5" 
          step="1" 
          value="3"
        />
        <p id="intensityValue">Intensity: Neutral</p>

        <div class="slider-labels">
          <span>Low</span>
          <span>Neutral</span>
          <span>High</span>
        </div>
      </div>

      <textarea 
        id="moodNote" 
        class="note-box" 
        placeholder="Share more..."
      ></textarea>

      <button type="button" id="nextBtn" class="next-button">Next →</button>

    </div>
  </div>

  <script type="module" src="js/mood-details.js"></script>
</body>
</html>
