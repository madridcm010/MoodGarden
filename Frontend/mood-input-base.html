<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mood Input</title>
  <link rel="stylesheet" href="mood-input-base.css">
</head>
<body>
<div class="mood-input-base">
  <a href="/Frontend/index.html" class="moodgarden">MoodGarden</a>
  <div class="question">How are you feeling today?</div>

  <div class="mood-buttons">
    <div class="mood-button" id="happyMoodBtn">
      <div class="emoji">😊</div>
      <div class="label">Happy</div>
    </div>
    <div class="mood-button" id="sadMoodBtn">
      <div class="emoji">😢</div>
      <div class="label">Sad</div>
    </div>
    <div class="mood-button" id="angryMoodBtn">
      <div class="emoji">😡</div>
      <div class="label">Angry</div>
    </div>
    <div class="mood-button" id="anxiousMoodBtn">
      <div class="emoji">😰</div>
      <div class="label">Anxious</div>
    </div>
    <div class="mood-button" id="calmMoodBtn">
      <div class="emoji">😌</div>
      <div class="label">Calm</div>
    </div>
  </div>
</div>
<button id="nextBtn">Continue</button>
<script src="js/api.js"></script>
<script src="js/mood.js"></script>
<script src="js/theme.js"></script>
</body>
</html>
