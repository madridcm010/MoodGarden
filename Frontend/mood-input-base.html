<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mood Input</title>
  <link rel="stylesheet" href="mood-input-base.css">
</head>
<body>
<div class="mood-input-base">
  <a href="/Frontend/index.html" class="moodgarden">MoodGarden</a>
  <div class="question">How are you feeling today?</div>

  <div class="mood-buttons">
    <div class="mood-button">
      <div class="emoji">😊</div>
      <div class="label">Happy</div>
    </div>
    <div class="mood-button">
      <div class="emoji">😢</div>
      <div class="label">Sad</div>
    </div>
    <div class="mood-button">
      <div class="emoji">😡</div>
      <div class="label">Angry</div>
    </div>
    <div class="mood-button">
      <div class="emoji">😰</div>
      <div class="label">Anxious</div>
    </div>
    <div class="mood-button">
      <div class="emoji">😌</div>
      <div class="label">Calm</div>
    </div>
  </div>
</div>

</body>
</html>
