<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MoodPath</title>
  <link rel="stylesheet" href="moodpath.css" />
</head>
<body>

  <nav class="navbar">
    <h1>🌿 MoodPath</h1>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">← Back</button>
  </nav>

  <main class="moodpath-container">

    <section class="card mood-header">
      <h2>Your MoodPath</h2>
      <p id="moodText">Loading mood...</p>
    </section>

    <div class="path-grid">

      <!-- Exercise Path -->
      <section class="card path-card">
        <h3>Exercise Path 🏃‍♂️</h3>
        <ul id="exerciseList"></ul>
      </section>

      <!-- Hobby Path -->
      <section class="card path-card">
        <h3>Hobby Path 🎨</h3>
        <ul id="hobbyList"></ul>
      </section>

      <!-- Mindfulness Path -->
      <section class="card path-card">
        <h3>Mindfulness Path 🧘</h3>
        <ul id="mindfulnessList"></ul>
      </section>

      <!-- Social Path -->
      <section class="card path-card">
        <h3>Social Path 🤝</h3>
        <ul id="socialList"></ul>
      </section>

    </div>

  </main>

  <script type="module" src="js/moodpath.js"></script>
    <script type="module" src="js/theme.js"></script>
</body>
</html>
