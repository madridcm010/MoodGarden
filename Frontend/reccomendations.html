<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recommendations</title>
  <link rel="stylesheet" href="recommendations.css" />
</head>

<body>
  <div class="recommendations-page">
    <header class="top-bar">
      <h1 class="logo">MoodGarden</h1>
    </header>

    <main class="content">
      <h2 class="section-title">Helpful quote</h2>

      <section class="card" id="quoteCard"></section>

      <div class="row">
        <h3 class="sub-title">Tips</h3>
        <section class="card" id="tipsCard"></section>
      </div>

      <div class="row">
        <h3 class="sub-title">Recommended Action:</h3>
        <section class="card" id="actionCard"></section>
      </div>

      <button id="logMoreBtn" class="cta-btn">Want to log more?</button>
    </main>
  </div>

  <!-- IMPORTANT: JS FILES -->
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
