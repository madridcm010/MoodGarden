<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="lgn-page.css">
</head>
<body>
    
   <div class="login-page">
  <div class="login-container">

    <h1 class="welcome">Welcome Back!</h1>

    <label class="label">Email:</label>
    <input type="email" id="email" class="input-box" required>

    <label class="label">Password:</label>
    <input type="password" id="password" class="input-box" required>

    <button class="login-btn" id="loginBtn">Log in</button>

    <div class="links">
      <a href="signup.html">New User? To register click here</a>
      <a href="#">Forgot email? Forgot password?</a>
    </div>

  </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
