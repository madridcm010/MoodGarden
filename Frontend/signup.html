<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account</title>
  <link rel="stylesheet" href="signup.css" />
</head>

<body>
  <div class="signup-page">
    <form class="signup-card" id="signupForm">
      <h1>Create Your Mood Garden</h1>

      <label>
        Name (optional)
        <input type="text" id="name" />
      </label>

      <label>
        Email
        <input type="email" id="signupEmail" required />
      </label>

      <label>
        Password (minimum of 8 characters)
        <input type="password" id="signupPassword" minlength="8" required />
      </label>

      <label>
        Confirm Password
        <input type="password" id="confirmPassword" minlength="8" required />
      </label>

      <a href="login-page.html" class="login-text">Already have an account?</a>

      <button type="submit">Create Account</button>

      <p class="privacy-text">
        Your mood entries are private and secure
      </p>
    </form>
  </div>

<script type="module" src="js/api.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/theme.js"></script>
</body>
</html>
